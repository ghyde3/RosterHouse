<script type="text/babel">
const { Button, Input, Select, Checkbox, Switch } = window.RosterHouseDesignSystem_17c92d;
function Demo(){
  const [chk, setChk] = React.useState(true);
  const [sw, setSw] = React.useState(true);
  const [role, setRole] = React.useState('cook');
  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <Button variant="primary">Publish schedule</Button>

        <div style={{width:200}}>

        </div>
      </div>
      <div style={{display:'flex',gap:24,alignItems:'center'}}>
        <Checkbox label="Text me schedule updates" checked={chk} onChange={setChk} />
        <div style={{width:220}}><Switch label="Push notifications" checked={sw} onChange={setSw} /></div>
