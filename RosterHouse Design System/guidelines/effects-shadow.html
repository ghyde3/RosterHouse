<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-page);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:28px}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:100px;height:70px;background:var(--surface-card);border-radius:var(--radius-lg)}
  .lab{font-size:11px;font-weight:600;color:var(--text-secondary)}
</style>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm — resting card</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md — hover/raised</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg — modal/popover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-focus)"></div><div class="lab">focus ring</div></div>
</div>
