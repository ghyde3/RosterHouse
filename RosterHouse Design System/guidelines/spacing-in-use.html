<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing in use" subtitle="Card padding & internal gaps" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-page);padding:16px;box-sizing:border-box}
  .card{background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-3);box-shadow:var(--shadow-sm);width:280px}
  .title{font-size:var(--text-h3-size);font-weight:var(--text-h3-weight);color:var(--text-primary)}
  .sub{font-size:var(--text-body-sm-size);color:var(--text-secondary)}
  .row{display:flex;gap:var(--space-3)}
  .pill{background:var(--surface-brand-soft);color:var(--text-brand);font-size:11px;font-weight:600;padding:var(--space-2) var(--space-4);border-radius:var(--radius-pill)}
</style>
<div class="card">
  <div class="title">Tue, Jul 7</div>
  <div class="sub">7:00 AM – 3:00 PM · Line cook</div>
  <div class="row"><span class="pill">20px padding</span><span class="pill">8px gap</span></div>
</div>
