<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status colors" subtitle="Warm-tinted success / warning / danger / info" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-page);padding:16px;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .c{border-radius:var(--radius-lg);padding:14px;background:var(--surface-card);border:1px solid var(--border-default)}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px}
  .label{font-size:13px;font-weight:600;color:var(--text-primary)}
  .sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
</style>
<div class="grid">
  <div class="c"><span class="dot" style="background:var(--status-success)"></span><span class="label">Success</span><div class="sub">Shift confirmed, published</div></div>
  <div class="c"><span class="dot" style="background:var(--status-warning)"></span><span class="label">Warning</span><div class="sub">Conflict, unpublished draft</div></div>
  <div class="c"><span class="dot" style="background:var(--status-danger)"></span><span class="label">Danger</span><div class="sub">Double-booked, overtime</div></div>
  <div class="c"><span class="dot" style="background:var(--status-info)"></span><span class="label">Info</span><div class="sub">Tips, neutral notices</div></div>
</div>
