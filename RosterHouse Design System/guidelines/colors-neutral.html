<!-- @dsCard group="Colors" viewport="700x170" name="Neutral — Warm Paper" subtitle="Warm grays/creams replace cold gray & pure white/black" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .row{display:flex;height:150px}
  .sw{flex:1;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;font-size:11px;font-weight:600;color:var(--neutral-900);border-right:1px solid rgba(0,0,0,0.05)}
  .sw span{background:rgba(255,255,255,0.6);padding:2px 6px;border-radius:4px}
  .d{color:#fff}
  .d span{background:rgba(0,0,0,0.25)}
</style>
<div class="row">
  <div class="sw d" style="background:var(--neutral-900)"><span>900 ink</span></div>
  <div class="sw d" style="background:var(--neutral-800)"><span>800</span></div>
  <div class="sw d" style="background:var(--neutral-700)"><span>700</span></div>
  <div class="sw" style="background:var(--neutral-600)"><span>600</span></div>
  <div class="sw" style="background:var(--neutral-500)"><span>500</span></div>
  <div class="sw" style="background:var(--neutral-400)"><span>400</span></div>
  <div class="sw" style="background:var(--neutral-300)"><span>300</span></div>
  <div class="sw" style="background:var(--neutral-200)"><span>200</span></div>
  <div class="sw" style="background:var(--neutral-100)"><span>100 paper</span></div>
  <div class="sw" style="background:var(--neutral-50)"><span>50</span></div>
  <div class="sw" style="background:var(--neutral-0);border:1px solid var(--neutral-200)"><span>0</span></div>
</div>
