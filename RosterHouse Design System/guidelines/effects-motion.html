<!-- @dsCard group="Brand" viewport="700x150" name="Motion" subtitle="120-280ms ease-out, functional not decorative" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:16px;box-sizing:border-box}
  .btn{background:var(--accent-primary);color:var(--text-inverse);border:none;border-radius:var(--radius-md);padding:10px 18px;font-family:var(--font-sans);font-weight:600;font-size:14px;cursor:pointer;transition:background var(--duration-base) var(--ease-out), transform var(--duration-fast) var(--ease-standard)}
  .btn:hover{background:var(--accent-hover)}
  .btn:active{background:var(--accent-active);transform:translateY(1px)}
  .row{display:flex;gap:16px;align-items:center}
  .lab{font-size:12px;color:var(--text-secondary);font-family:var(--font-sans)}
</style>
<div class="row">
  <button class="btn">Hover / press me</button>
  <div class="lab">--duration-fast 120ms · --duration-base 180ms · --ease-out</div>
</div>
