<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .row{display:flex;height:150px}
  .sw{flex:1;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;font-size:11px;font-weight:600;color:var(--neutral-900)}
  .sw span{background:rgba(255,255,255,0.5);padding:2px 6px;border-radius:4px}
  .d{color:#fff}
  .d span{background:rgba(0,0,0,0.2)}
</style>
<div class="row">
  <div class="sw d" style="background:var(--amber-900)"><span>900</span></div>
  <div class="sw d" style="background:var(--amber-800)"><span>800</span></div>
  <div class="sw d" style="background:var(--amber-700)"><span>700</span></div>
  <div class="sw" style="background:var(--amber-600)"><span>600</span></div>
  <div class="sw" style="background:var(--amber-500)"><span>500 base</span></div>
  <div class="sw" style="background:var(--amber-400)"><span>400</span></div>
  <div class="sw" style="background:var(--amber-300)"><span>300</span></div>
  <div class="sw" style="background:var(--amber-200)"><span>200</span></div>
  <div class="sw" style="background:var(--amber-100)"><span>100</span></div>
  <div class="sw" style="background:var(--amber-50)"><span>50</span></div>
</div>
