<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base unit" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:16px;box-sizing:border-box}
  .row{display:flex;align-items:flex-end;gap:8px;height:110px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--green-600);width:20px}
  .lab{font-size:10px;color:var(--text-secondary);font-weight:600}
</style>
<div class="row">
  <div class="item"><div class="bar" style="height:var(--space-3)"></div><div class="lab">8</div></div>
  <div class="item"><div class="bar" style="height:var(--space-4)"></div><div class="lab">12</div></div>
  <div class="item"><div class="bar" style="height:var(--space-5)"></div><div class="lab">16</div></div>
  <div class="item"><div class="bar" style="height:var(--space-6)"></div><div class="lab">20</div></div>
  <div class="item"><div class="bar" style="height:var(--space-7)"></div><div class="lab">24</div></div>
  <div class="item"><div class="bar" style="height:var(--space-8)"></div><div class="lab">32</div></div>
  <div class="item"><div class="bar" style="height:var(--space-9)"></div><div class="lab">40</div></div>
  <div class="item"><div class="bar" style="height:var(--space-10)"></div><div class="lab">48</div></div>
  <div class="item"><div class="bar" style="height:var(--space-11)"></div><div class="lab">64</div></div>
  <div class="item"><div class="bar" style="height:var(--space-12)"></div><div class="lab">80</div></div>
</div>
