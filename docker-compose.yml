
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rosterhouse
      POSTGRES_PASSWORD: rosterhouse
      POSTGRES_DB: rosterhouse
    ports:
      - "5432:5432"
    volumes:
      - rosterhouse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosterhouse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rosterhouse_pgdata:
